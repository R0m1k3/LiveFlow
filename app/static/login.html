<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <title>LiveFlow — Connexion</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%99%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css?v=2">
  <style>
    body { align-items: center; justify-content: center; overflow: auto; }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      width: min(380px, 92vw);
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-brand { display: flex; align-items: center; gap: 10px; justify-content: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .login-sub { text-align: center; color: var(--muted); font-size: .88rem; margin-top: -8px; }
    .login-card input {
      background: var(--bg-2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 13px 15px; font-size: .98rem;
    }
    .login-card input:focus { outline: none; border-color: var(--accent); }
    .login-card button {
      border: none; cursor: pointer; color: #fff; font-weight: 700; font-size: 1rem;
      padding: 13px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 20px rgba(91,140,255,.35);
      transition: transform .12s;
    }
    .login-card button:hover { transform: translateY(-1px); }
    #login-error { color: #ff9398; font-size: .85rem; text-align: center; min-height: 1.2em; }
  </style>
</head>
<body>
  <form class="login-card" id="login-form">
    <div class="login-brand"><span>🎙️</span><span>LiveFlow</span></div>
    <p class="login-sub">Transcription de réunions en direct</p>
    <input id="username" type="text" placeholder="Utilisateur" autocomplete="username" required autofocus>
    <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <div id="login-error"></div>
  </form>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      if (resp.ok) {
        location.href = '/';
      } else {
        document.getElementById('login-error').textContent = 'Identifiants invalides';
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>

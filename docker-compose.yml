services:
  app:
    build: ./app
    restart: unless-stopped
    ports:
      - "8443:8000"
    environment:
      # IP ou nom d'hôte du serveur, pour le certificat HTTPS auto-signé
      - LIVEFLOW_HOST=${LIVEFLOW_HOST:-localhost}
      # Identifiants de connexion à l'interface
      - LIVEFLOW_USER=${LIVEFLOW_USER:-admin}
      - LIVEFLOW_PASSWORD=${LIVEFLOW_PASSWORD:-admin}
      - ASR_BASE_URL=http://asr:8000/v1
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - ASR_API_KEY=${ASR_API_KEY:-sk-local}
      # Code langue ISO ("fr", "en"...) ou vide pour la détection automatique
      - ASR_LANGUAGE=${ASR_LANGUAGE:-}
      - DB_PATH=/data/liveflow.db
    volumes:
      - liveflow-data:/data
    depends_on:
      - asr

  asr:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    # L'image officielle vLLM n'embarque pas les décodeurs audio (soundfile,
    # librosa) : on les installe au démarrage avant de lancer le serveur.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        echo '--- LiveFlow : installation des décodeurs audio (soundfile, librosa) ---' &&
        pip install -q soundfile librosa &&
        echo '--- LiveFlow : décodeurs installés, démarrage de vLLM ---' &&
        exec vllm serve Qwen/Qwen3-ASR-1.7B
        --max-model-len 8192
        --gpu-memory-utilization 0.70
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  liveflow-data:
  hf-cache:

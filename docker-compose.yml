services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  app:
    build: ./app
    restart: unless-stopped
    environment:
      - ASR_BASE_URL=http://asr:8000/v1
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - ASR_API_KEY=${ASR_API_KEY:-sk-local}
      # Code langue ISO ("fr", "en"...) ou vide pour la détection automatique
      - ASR_LANGUAGE=${ASR_LANGUAGE:-}
      - DB_PATH=/data/liveflow.db
    volumes:
      - liveflow-data:/data
    depends_on:
      - asr

  asr:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    command: >-
      --model Qwen/Qwen3-ASR-1.7B
      --gpu-memory-utilization 0.70
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  caddy-data:
  caddy-config:
  liveflow-data:
  hf-cache:

services:
  app:
    build: ./app
    restart: unless-stopped
    ports:
      - "8443:8000"
    environment:
      # IP ou nom d'hôte du serveur, pour le certificat HTTPS auto-signé
      - LIVEFLOW_HOST=${LIVEFLOW_HOST:-localhost}
      - ASR_BASE_URL=http://asr:8000/v1
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - ASR_API_KEY=${ASR_API_KEY:-sk-local}
      # Code langue ISO ("fr", "en"...) ou vide pour la détection automatique
      - ASR_LANGUAGE=${ASR_LANGUAGE:-fr}
      - DB_PATH=/data/liveflow.db
      # Diarisation des locuteurs (off par défaut pour rétrocompatibilité)
      - DIARIZATION=${DIARIZATION:-off}
      - DIARIZATION_THRESHOLD=${DIARIZATION_THRESHOLD:-0.70}
      - DIARIZATION_MAX_SPEAKERS=${DIARIZATION_MAX_SPEAKERS:-8}
    volumes:
      - liveflow-data:/data
    depends_on:
      - asr

  asr:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    command: >-
      --model Qwen/Qwen3-ASR-1.7B
      --max-model-len 8192
      --gpu-memory-utilization 0.70
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  liveflow-data:
  hf-cache:

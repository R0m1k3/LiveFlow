# Compose adapté à Unraid (plugin "Docker Compose Manager").
#
# Prérequis : plugin "Nvidia Driver" (Community Applications).
#
# L'image de l'app est construite et publiée automatiquement par GitHub
# Actions à chaque mise à jour du code. Pour mettre à jour :
#   docker compose -f docker-compose.unraid.yml pull && \
#   docker compose -f docker-compose.unraid.yml up -d
#
# Accès : https://<ip-unraid>:8443 (certificat auto-signé), ou via votre
# reverse proxy avec LIVEFLOW_TLS=off (scheme http, websockets activés).

services:
  app:
    image: ghcr.io/r0m1k3/liveflow:latest
    container_name: liveflow-app
    restart: unless-stopped
    ports:
      - "8443:8000"
    environment:
      # ← IP (ou nom d'hôte) de votre serveur Unraid, pour le certificat HTTPS
      - LIVEFLOW_HOST=192.168.1.16
      # "off" si un reverse proxy (Nginx Proxy Manager, SWAG...) gère déjà le
      # HTTPS : l'app sert alors du HTTP simple sur le port 8443.
      - LIVEFLOW_TLS=off
      - ASR_BASE_URL=http://asr:8000/v1
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - ASR_API_KEY=sk-local
      # Code langue ISO ("fr", "en"...) ou vide pour la détection automatique
      - ASR_LANGUAGE=fr
      - DB_PATH=/data/liveflow.db
    volumes:
      - /mnt/user/appdata/liveflow/data:/data
    depends_on:
      - asr

  asr:
    image: vllm/vllm-openai:latest
    container_name: liveflow-asr
    restart: unless-stopped
    # L'image officielle vLLM n'embarque pas les décodeurs audio (soundfile,
    # librosa) : on les installe au démarrage avant de lancer le serveur.
    entrypoint: ["/bin/bash", "-c"]
    command: >-
      pip install -q soundfile librosa &&
      exec vllm serve Qwen/Qwen3-ASR-1.7B
      --max-model-len 8192
      --gpu-memory-utilization 0.70
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /mnt/user/appdata/liveflow/hf-cache:/root/.cache/huggingface
    ipc: host

